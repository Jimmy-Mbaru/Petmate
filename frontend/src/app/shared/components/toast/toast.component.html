<div
  class="toast-container"
  role="region"
  aria-label="Notifications"
>
  @for (toast of toastService.items(); track toast.id) {
    <div
      [class]="variantClasses(toast.variant)"
      class="toast-item"
      role="alert"
    >
      <div class="flex-1 min-w-0">
        <p
          class="font-semibold text-sm m-0"
          [class.font-bold]="toast.highlightTitle"
        >
          {{ toast.title }}
        </p>
        <p class="text-sm opacity-90 m-0 mt-1">
          {{ toast.message }}
        </p>
      </div>
      <button
        type="button"
        class="shrink-0 p-1 rounded opacity-70 hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-inset"
        aria-label="Dismiss"
        (click)="close(toast)"
      >
        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
        </svg>
      </button>
    </div>
  }
</div>
