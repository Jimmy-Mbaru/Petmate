@if (isLoading()) {
  <div class="fixed inset-0 z-9999 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="flex flex-col items-center gap-6" data-aos="zoom-in">
      <!-- Animated Logo/Spinner Container -->
      <div class="relative">
        <!-- Outer rotating ring -->
        <div class="w-24 h-24 rounded-full border-4 border-gray-200/30 animate-spin"></div>
        
        <!-- Inner gradient ring -->
        <div class="absolute inset-0 w-24 h-24 rounded-full border-4 border-transparent border-t-[--color-primary] border-r-[--color-primary-hover] animate-spin"></div>
        
        <!-- Center icon -->
        <div class="absolute inset-0 flex items-center justify-center">
          <div class="w-12 h-12 rounded-full bg-linear-to-br from-[--color-primary] to-[--color-primary-hover] flex items-center justify-center shadow-2xl animate-pulse">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
        </div>

        <!-- Orbiting dots -->
        <div class="absolute inset-0 w-24 h-24 animate-spin" style="animation-duration: 2s">
          <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1 w-3 h-3 rounded-full bg-[--color-primary] shadow-lg shadow-[--color-primary]/50"></div>
        </div>
        <div class="absolute inset-0 w-24 h-24 animate-spin" style="animation-duration: 2s; animation-direction: reverse">
          <div class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1 w-3 h-3 rounded-full bg-[--color-primary-hover] shadow-lg shadow-[--color-primary-hover]/50"></div>
        </div>
      </div>

      <!-- Loading Text -->
      <div class="text-center">
        <p class="text-white font-semibold text-lg mb-2">Loading</p>
        <div class="flex items-center justify-center gap-1">
          <span class="w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay: 0s"></span>
          <span class="w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
          <span class="w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="w-48 h-1 bg-white/20 rounded-full overflow-hidden">
        <div class="h-full bg-linear-to-r from-[--color-primary] to-[--color-primary-hover] rounded-full animate-pulse" style="width: 60%"></div>
      </div>
    </div>
  </div>
}
