<div class="h-dvh min-h-0 flex items-center justify-center bg-[#f5eded] px-4">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
    <div class="p-8">
      <!-- Logo -->
      <div class="flex items-center gap-3 mb-8 justify-center">
        <svg class="w-10 h-10 text-[#d72323]" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 10a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-4 3a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-4 2a4 4 0 0 1-4-4 4 4 0 0 1 4-4 4 4 0 0 1 4 4 4 4 0 0 1-4 4z"/>
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
        </svg>
        <span class="font-bold text-2xl uppercase tracking-wide text-[#000000]">PetMate</span>
      </div>

      @if (!isSubmitted()) {
        <div class="text-center mb-8">
          <h2 class="font-['Playfair_Display',Georgia,serif] text-3xl font-bold text-[#000000] mb-2">Forgot Password?</h2>
          <p class="text-[#363636] text-sm">Enter your email and we'll send you a link to reset your password.</p>
        </div>

        <form (ngSubmit)="onSubmit()" class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-semibold text-[#000000] mb-2">Email Address</label>
            <input
              id="email"
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="you@example.com"
              required
              class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-[#d72323] focus:ring-2 focus:ring-[#d72323]/20 transition-all text-sm"
            />
          </div>

          <button
            type="submit"
            [disabled]="isLoading()"
            class="w-full py-3.5 rounded-xl bg-[#d72323] hover:bg-[#bc1f1f] text-white font-semibold shadow-lg shadow-[#d72323]/20 transition-all flex items-center justify-center gap-2 disabled:opacity-70"
          >
            @if (isLoading()) {
              <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Sending Link...
            } @else {
              <span>Send Reset Link</span>
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
              </svg>
            }
          </button>
        </form>
      } @else {
        <div class="text-center py-8">
          <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <h2 class="font-['Playfair_Display',Georgia,serif] text-3xl font-bold text-[#000000] mb-4">Check Your Email</h2>
          <p class="text-[#363636] text-sm mb-8 leading-relaxed">
            If an account exists for <span class="font-bold text-[#000000]">{{ email }}</span>, you will receive a password reset link shortly.
          </p>
          <a routerLink="/auth/login" class="text-[#d72323] font-semibold hover:underline">Return to Login</a>
        </div>
      }

      <div class="mt-8 text-center border-t border-gray-100 pt-6">
        <a routerLink="/auth/login" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-[#000000] transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Back to login
        </a>
      </div>
    </div>
  </div>
</div>
