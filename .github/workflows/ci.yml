name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  backend:
    name: Backend (lint, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: petmate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d petmate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/petmate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:cov -- --passWithNoTests

      - name: Push Prisma schema (migrate deploy)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/petmate

      - name: E2E tests
        run: npm run test:e2e -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/petmate
